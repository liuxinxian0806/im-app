name: Build Electron Windows App 🚀

on:
  push:
    branches:
      - main  # 当你向 main 分支推送代码时，自动触发构建
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest  # 核心：使用 GitHub 提供的真实 Windows 环境进行打包
    
    steps:
      # 1. 拉取你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js 环境 (建议与你本地版本一致，这里用 v20)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. 安装依赖
      # 使用 npm ci 而不是 npm install，因为 ci 在自动化环境下更快速、更稳定、更严格
      - name: Install dependencies
        run: npm ci

      # 4. 执行构建脚本 (假设你的 package.json 中有 build 脚本)
      # 这步会运行 Vite/Webpack 编译前端代码，生成 dist 目录
      - name: Build Frontend
        run: npm run build

      # 5. 执行 Electron 打包 (使用 electron-builder)
      # 这个步骤会在 windows 环境下调用真实的 Windows 指令集进行打包
      - name: Build Electron App
        run: npx electron-builder --win --ia32  # 打包 32 位或 64 位 Windows 版本

      # 6. 上传成品 (Artifact)
      # 构建完成后，将生成的 .exe 文件上传到 GitHub 页面上供你下载
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Electron-Windows-Installer
          path: dist/*.exe  # 假设你的安装包生成在 dist 目录下

