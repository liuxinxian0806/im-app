name: Build Electron Windows App 🚀

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. 拉取代码 (Standard checkout)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js (Let setup-node use its default lookup logic)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. 安装依赖 (Explicitly enter im-app)
      - name: Install dependencies
        run: npm ci
        working-directory: im-app

      # 4. 执行应用构建 (Explicitly enter im-app)
      - name: Build App Assets
        run: npm run build:app
        working-directory: im-app

      # 5. 执行真正的 Electron 打包 (Explicitly enter im-app)
      - name: Package Electron App
        run: npm run package
        working-directory: im-app

      # 6. 上传成品 (Path relative to repo root)
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Electron-Windows-Installer
          path: im-app/dist/*.exe
