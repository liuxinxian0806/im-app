name: Build Electron Windows App 🚀

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    # We use the root of the repo as the base for setup-node's cache lookup.
    # But we use working-directory for the actual execution steps to enter im-app.

    steps:
      # 1. 拉取代码 (Standard checkout)
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          # This is the critical fix: pointing to the path relative to repo root
          cache-dependency-path: im-app/package-lock.json

      # 3. 安装依赖 (Explicitly enter im-app)
      - name: Install dependencies
        run: npm ci
        working-directory: im-app

      # 4. 执行应用构建 (Explicitly enter im-app)
      - name: Build App Assets
        run: npm run build:app
        working-directory: im-app

      # 5. 执行真正的 Electron 打包 (Explicitly enter im-app)
      - name: Package Electron App
        run: npm run package
        working-directory: im-app

      # 6. 上传成品 (Path relative to repo root)
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Electron-Windows-Installer
          path: im-app/dist/*.exe
