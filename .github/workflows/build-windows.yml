name: Build Electron Windows App 🚀

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: im-app

    steps:
      # 1. 拉取代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: im-app/package-lock.json

      # 3. 安装依赖
      - name: Install dependencies
        run: npm ci

      # 4. 执行应用构建
      - name: Build App Assets
        run: npm run build:app

      # 5. 执行真正的 Electron 打包
      - name: Package Electron App
        run: npm run package

      # 6. 上传成品
      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Electron-Windows-Installer
          path: im-app/dist/*.exe
